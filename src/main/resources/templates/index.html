<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Modal</title>

  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        media="print" onload="this.media='all'">
</head>
<body>

<div th:replace="fragments/nav-bar.html :: header"></div>

<main>

  <section class="hero
                  py-[clamp(60px,10vw,100px)] px-[clamp(16px,4vw,20px)]
                  pb-[clamp(48px,8vw,80px)]
                  text-center border-b border-[#e2e8f8]"
           style="background:
             radial-gradient(ellipse at 65% 0%, #dbeafe99 0%, transparent 55%),
             radial-gradient(ellipse at 15% 90%, #e0e7ff66 0%, transparent 50%),
             #ffffff;">

    <div class="max-w-200 mx-auto">

      <!-- Heading -->
      <h1 class="hero-heading
                 text-[clamp(2rem,6vw,3.8rem)] font-extrabold
                 mb-[clamp(12px,2vw,16px)] leading-[1.08] tracking-[-0.025em]">
        Build better decks.
      </h1>

      <!-- Subheading -->
      <p class="text-[clamp(1rem,2.5vw,1.15rem)] text-[#64748b]
                mb-[clamp(28px,5vw,40px)] font-light leading-[1.7]
                max-w-150 mx-auto">
        The most advanced deckbuilding platform for Magic: The Gathering.
      </p>

      <!-- Search bar -->
      <form class="search-bar
                   flex max-w-150 w-full mx-auto mb-[clamp(24px,4vw,40px)]
                   bg-white border border-[#e2e8f8] rounded-xl overflow-hidden
                   shadow-[0_4px_20px_rgba(37,99,235,.1)]
                   transition-[border-color,box-shadow] duration-200"
            th:action="@{/search}" method="GET">

        <div class="search-input-wrapper flex flex-1 items-center pl-4 min-w-0">
          <i class="fas fa-search text-[#64748b] shrink-0"></i>
          <label for="query" class="sr-only">Search</label>
          <input type="text" name="query" id="query"
                 placeholder="Search for cards, decks, or users..."
                 class="w-full py-[clamp(12px,2vw,16px)] px-3
                        bg-transparent border-none outline-none
                        text-[#0f172a] text-[clamp(.9rem,2vw,1rem)]
                        placeholder-[#64748b] min-w-0">
        </div>

        <button type="submit"
                class="grad-bg text-white border-none
                       px-[clamp(16px,3vw,28px)]
                       font-bold text-[clamp(.82rem,1.5vw,.9rem)]
                       cursor-pointer transition-opacity duration-200
                       hover:opacity-[.88] whitespace-nowrap self-stretch">
          Search
        </button>
      </form>

      <!-- CTA buttons -->
      <div class="flex gap-[clamp(10px,2vw,14px)] justify-center flex-wrap
                  max-md:flex-col max-md:items-center">

        <a href="#"
           class="bg-blue-500 text-white no-underline font-bold
                  py-[clamp(10px,2vw,12px)] px-[clamp(20px,3vw,28px)]
                  rounded-[10px] text-[clamp(.88rem,2vw,.95rem)]
                  shadow-[0_4px_20px_rgba(37,99,235,.25)]
                  transition-all duration-200
                  hover:opacity-[.88] hover:-translate-y-0.5
                  hover:shadow-[0_8px_28px_rgba(37,99,235,.35)]
                  inline-flex items-center justify-center whitespace-nowrap
                  max-md:w-full max-md:max-w-85">
          Get Started
        </a>

        <a href="#"
           class="bg-white text-[#0f172a] no-underline font-semibold
                  py-[clamp(10px,2vw,12px)] px-[clamp(20px,3vw,28px)]
                  border border-[#e2e8f8] rounded-[10px]
                  text-[clamp(.88rem,2vw,.95rem)]
                  shadow-[0_1px_4px_rgba(37,99,235,.07)]
                  transition-all duration-200
                  hover:border-[#2563eb] hover:text-[#2563eb]
                  hover:shadow-[0_4px_16px_rgba(37,99,235,.1)]
                  hover:-translate-y-px
                  inline-flex items-center justify-center whitespace-nowrap
                  max-md:w-full max-md:max-w-85">
          Learn More
        </a>
      </div>
    </div>
  </section>
</main>

<!-- ══ FOOTER (fragment) ══ -->
<div th:replace="fragments/footer.html :: footer"></div>

<!-- Mobile nav toggle -->
<script>
  document.querySelector('.mobile-menu-toggle')
    .addEventListener('click', function () {
      document.querySelector('.nav-drawer').classList.toggle('active');
    });
</script>

</body>
</html>
