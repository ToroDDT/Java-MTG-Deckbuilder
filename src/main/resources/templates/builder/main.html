<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Deckbuilder | Dashboard</title>
    <meta name="description"
          th:content="|Edit Deck mana curve, hand simulation, and card search in the deck builder.|"
          content="Build your commander decks with cards searching and filtering tools."/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script th:src="@{/js/builder-tailwind-config.min.js}"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/nav-bar.min.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>

<body class="bg-[#f9f9ff] text-[#191b23] font-[Inter,sans-serif]">

<div th:replace="~{fragments/nav-bar.html :: nav}"></div>

<div class="flex min-h-screen min-w-0 bg-[#f9f9ff]">
    <main class="flex-1 w-full min-w-0 max-w-[1480px] mx-auto"
          style="padding: clamp(1.25rem, 3vw, 2.5rem);
                 background: radial-gradient(ellipse at 70% 0%, rgba(216,226,255,0.55), transparent 42%), #f9f9ff;">

        <!-- Hero Header -->
        <section class="mb-12" style="padding-bottom: clamp(1rem, 2vw, 1.5rem);">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="flex gap-8 items-start">
                    <div class="w-48 h-64 rounded-xl overflow-hidden shadow-[0_20px_40px_rgba(25,27,35,0.12)] shrink-0 border-4 border-white">
                        <img alt="The Commander"
                             class="w-full h-full object-cover"
                             decoding="async" fetchpriority="high" height="256" width="192"
                             th:src="@{${builderView.image}}"/>
                    </div>
                    <div class="pt-4">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-secondary-container text-on-secondary-container text-[10px] font-black px-2 py-1 rounded-full tracking-widest uppercase">Commander</span>
                            <span class="flex items-center gap-1">
                                <div class="w-4 h-4 rounded-full bg-blue-500 border border-black/10"></div>
                                <div class="w-4 h-4 rounded-full bg-green-500 border border-black/10"></div>
                                <div class="w-4 h-4 rounded-full bg-white border border-black/10 shadow-sm"></div>
                            </span>
                        </div>
                        <h1 class="text-5xl font-black text-on-background tracking-tight mb-4 leading-none"
                            th:text="${builderView.deckName}">The Necrobloom</h1>
                        <div class="flex gap-6 text-on-surface-variant font-medium">
                            <div class="flex flex-col">
                                <span class="text-[10px] uppercase tracking-wider text-slate-600">Owner</span>
                                <span th:text="${userName}">Owner</span>
                            </div>
                            <div class="flex flex-col border-l border-outline-variant pl-6">
                                <span class="text-[10px] uppercase tracking-wider text-slate-600">Win Rate</span>
                                <span class="text-blue-600">62.4%</span>
                            </div>
                            <div class="flex flex-col border-l border-outline-variant pl-6">
                                <span class="text-[10px] uppercase tracking-wider text-slate-600">Value</span>
                                <span th:text="'$'+${builderView.totalValue}">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col lg:flex-row lg:items-end gap-1">
                    <button type="button"
                            id="builder-open-view-options"
                            class="text-blue-800 font-semibold hover:underline text-left whitespace-nowrap">
                        Edit View Options
                    </button>
                    <form id="builderAddCardForm" class="flex-1 flex flex-col gap-2 min-w-0"
                          th:action="@{/personal-library/add}" th:object="${ownedCard}" method="post">
                        <input type="hidden" name="_builderCardContext" value="true"/>
                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-600"
                               for="builder-card-name">
                            Search cards (add to library)
                        </label>
                        <div class="relative">
                            <input type="text" name="query" id="builder-card-name" autocomplete="off"
                                   class="rounded-xl font-medium bg-surface-container-highest text-on-surface shadow-sm border border-outline-variant/30 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                                   placeholder="Search a card..."
                                   th:attr="hx-get=@{/builder/deck/{did}/card-query(did=${builderView.deckId})}"
                                   hx-trigger="input changed delay:200ms"
                                   hx-target="#builder-card-query-results"
                                   hx-swap="innerHTML"
                                   hx-on::after-request="const r=document.getElementById('builder-card-query-results'); r.classList.toggle('hidden', !r.innerText.trim())"
                                   onblur="setTimeout(()=>document.getElementById('builder-card-query-results').classList.add('hidden'),150)"/>
                            <div id="builder-card-query-results"
                                 class="hidden absolute top-full left-0 right-0 mt-1 z-50
                                        max-h-60 overflow-y-auto rounded-xl
                                        border border-outline-variant/40
                                        bg-white shadow-lg px-1 py-1 text-left">
                            </div>
                        </div>
                    </form>

                    <div class="flex flex-wrap gap-3 shrink-0">
                        <button type="button"
                                class="px-6 py-3 rounded-xl font-bold bg-white text-on-surface shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined">share</span> Share
                        </button>
                        <button type="button"
                                class="px-6 py-3 rounded-xl font-bold bg-blue-400 text-on-surface shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined">Create</span> Buy
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Grid Content -->
        <div class="grid grid-cols-12 gap-8 min-w-0">

            <!-- Left Column: Decklist (8/12) — min-w-0 lets the column shrink so HTMX views don’t blow out the 12-col grid -->
            <div class="col-span-12 xl:col-span-8 min-w-0 isolate">
                <!-- Hidden + script are outside the spaced stack so space-y / gap doesn’t add margin above #type-layout-container -->
                <div id="builder-deck-layout-request-params" hidden>
                    <input type="hidden" name="viewStyle" id="builder-deck-layout-view-style-input" value="text"/>
                    <input type="hidden" name="groupBy" id="builder-deck-layout-group-input" value="type"/>
                    <input type="hidden" name="sortBy" id="builder-deck-layout-sort-input" value="name"/>
                    <div id="builder-deck-layout-extras-fields"></div>
                </div>
                <script th:inline="javascript">
                    (function () {
                        function applyPrefs(prefObject) {
                            var p = (prefObject && typeof prefObject === 'object')
                                ? prefObject
                                : {};

                            function setHidden(id, v, fallback) {
                                var el = document.getElementById(id);
                                if (!el) return;
                                el.value = (v !== undefined && v !== null && v !== '')
                                    ? '' + v
                                    : fallback;
                            }

                            function rebuildExtras(extraKeys) {
                                var box = document.getElementById('builder-deck-layout-extras-fields');
                                if (!box) return;
                                box.innerHTML = '';
                                (extraKeys || []).forEach(function (key) {
                                    if (!key) return;
                                    var input = document.createElement('input');
                                    input.type = 'hidden';
                                    input.name = 'extras';
                                    input.value = '' + key;
                                    box.appendChild(input);
                                });
                            }

                            setHidden('builder-deck-layout-view-style-input', p.viewStyle, 'text');
                            setHidden('builder-deck-layout-group-input', p.groupBy, 'type');
                            setHidden('builder-deck-layout-sort-input', p.sortBy, 'name');

                            rebuildExtras(Array.isArray(p.extras) ? p.extras : []);
                        }

                        window.__BUILDER_SYNC_DECK_LAYOUT_HIDDENS__ = applyPrefs;

                        var deckId = /*[[${builderView.deckId}]]*/ '';
                        try {
                            var raw = localStorage.getItem('mtg-builder-view:' + deckId);
                            if (!raw) return;
                            applyPrefs(JSON.parse(raw));
                        } catch (ignored) {}
                    })();
                </script>
                <div class="flex flex-col gap-12">
                    <div id="type-layout-container"
                         class="min-h-[18rem] w-full max-w-full min-w-0 transition-all duration-200 overflow-x-auto"
                         hx-include="#builder-deck-layout-request-params"
                         th:attr="hx-get=@{/builder/type-layout/{id}(id=${builderView.deckId})}"
                         hx-trigger="load, cardsUpdated from:body, builderViewChanged from:body"
                         hx-swap="innerHTML">
                    </div>

                    <!-- Randomized Hand Section -->
                    <div>
                        <main>
                            <section class="bg-surface-dim rounded-3xl overflow-hidden">
                                <div id="randomized-hand-container"
                                     class="w-full"
                                     th:attr="hx-get=@{/builder/randomize-cards(deckId=${builderView.deckId})}"
                                     hx-trigger="load, cardsUpdated from:body"
                                     hx-swap="innerHTML">
                                    <div class="p-4 text-slate-600 min-h-[14rem]">
                                        Loading hand...
                                    </div>
                                </div>
                            </section>
                        </main>
                    </div>
                </div>
            </div>

            <!-- Right Column: Statistics (4/12) — sticky; z-index above deck hover lifts so panels aren’t clipped oddly -->
            <div class="col-span-12 xl:col-span-4 space-y-8 xl:sticky xl:top-24 self-start min-w-0 z-20">

                <!-- Mana Curve -->
                <div class="bg-white/[.92] backdrop-blur-md rounded-3xl p-6
                            border border-[rgba(194,198,214,.55)]
                            shadow-[0_20px_40px_rgba(25,27,35,.06)]">
                    <h2 class="text-sm font-black text-on-background uppercase tracking-wider mb-8">Mana Curve</h2>
                    <div class="relative h-48 w-full min-h-[12rem]" role="presentation">
                        <canvas id="myChart"
                                aria-label="Mana curve showing card counts by mana value"
                                class="block h-full w-full max-w-full"></canvas>
                    </div>
                </div>

                <!-- Color Production -->
                <div class="bg-white/[.92] backdrop-blur-md rounded-3xl p-6
                            border border-[rgba(194,198,214,.55)]
                            shadow-[0_20px_40px_rgba(25,27,35,.06)]">
                    <h2 class="text-sm font-black text-on-background uppercase tracking-wider mb-6">Color Production</h2>
                    <div class="space-y-6">
                        <div class="relative h-32 w-full min-h-[8rem]" role="presentation">
                            <canvas id="colorProduction"
                                    aria-label="Color production chart"
                                    class="block h-full w-full max-w-full"></canvas>
                        </div>

                        <!-- Same order as colorProduction chart (Red, White, Green, Black, Blue, Colorless) -->
                        <div th:each="label, stat : ${colorProductionLabels}" class="mb-4 last:mb-0"
                             th:with="rawCount=${colorProductionData.get(stat.index)},
                                      count=${rawCount != null ? rawCount : 0},
                                      total=${colorProductionTotal != null && colorProductionTotal > 0 ? colorProductionTotal : 1},
                                      pct=${count * 100.0 / total},
                                      dotClass=${stat.index == 0 ? 'bg-red-500 border-red-900/20' : (stat.index == 1 ? 'bg-slate-100 border-slate-300' : (stat.index == 2 ? 'bg-green-600 border-green-900/20' : (stat.index == 3 ? 'bg-slate-900 border-black/30' : (stat.index == 4 ? 'bg-blue-600 border-blue-900/20' : 'bg-slate-400 border-slate-500/40'))))},
                                      barClass=${stat.index == 0 ? 'bg-red-500' : (stat.index == 1 ? 'bg-slate-300' : (stat.index == 2 ? 'bg-green-500' : (stat.index == 3 ? 'bg-slate-900' : (stat.index == 4 ? 'bg-blue-600' : 'bg-slate-400'))))}">
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 shrink-0 rounded-full border"
                                         th:classappend="${dotClass}"></div>
                                    <span class="text-xs font-bold text-on-surface" th:text="${label}">Red</span>
                                </div>
                                <span class="text-xs font-bold text-slate-600"
                                      th:text="${#numbers.formatDecimal(pct, 1, 1)} + '%'">0%</span>
                            </div>
                            <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                                <div class="h-full rounded-full"
                                     th:classappend="${barClass}"
                                     th:style="|width: ${#numbers.formatDecimal(pct, 1, 2)}%;|"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Type Distribution -->
                <div class="bg-white/[.92] backdrop-blur-md rounded-3xl p-6
                            border border-[rgba(194,198,214,.55)]
                            shadow-[0_20px_40px_rgba(25,27,35,.06)]">
                    <h2 class="text-sm font-black text-on-background uppercase tracking-wider mb-6">Type Distribution</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-600 uppercase font-black block mb-1">Ramp</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">12</span>
                                <span class="text-[10px] font-bold text-green-600">+2 High</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-600 uppercase font-black block mb-1">Draw</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">9</span>
                                <span class="text-[10px] font-bold text-blue-600">Optimal</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-600 uppercase font-black block mb-1">Removal</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">7</span>
                                <span class="text-[10px] font-bold text-slate-600">Low</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-600 uppercase font-black block mb-1">Board Wipes</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">3</span>
                                <span class="text-[10px] font-bold text-slate-600">Balanced</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /right column -->
        </div><!-- /grid -->
    </main>
</div>

<th:block th:replace="~{builder/view-options-modal :: viewOptionsModal(${builderView.deckId})}"/>

<!-- Mobile Nav Bar -->
<div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center h-16 z-50">
    <button type="button" class="flex flex-col items-center gap-1 text-slate-600" aria-label="Home">
        <span class="material-symbols-outlined" aria-hidden="true">dashboard</span>
        <span class="text-[10px] font-bold">Home</span>
    </button>
    <button type="button" class="flex flex-col items-center gap-1 text-blue-600" aria-label="Decks">
        <span class="material-symbols-outlined" aria-hidden="true">list_alt</span>
        <span class="text-[10px] font-bold">Decks</span>
    </button>
    <div class="relative -top-6">
        <button type="button" class="bg-primary text-white p-4 rounded-full shadow-lg shadow-blue-300"
                aria-label="Add or quick actions">
            <span class="material-symbols-outlined" aria-hidden="true">add</span>
        </button>
    </div>
    <button type="button" class="flex flex-col items-center gap-1 text-slate-600" aria-label="Stats">
        <span class="material-symbols-outlined" aria-hidden="true">bar_chart</span>
        <span class="text-[10px] font-bold">Stats</span>
    </button>
    <button type="button" class="flex flex-col items-center gap-1 text-slate-600" aria-label="Profile">
        <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
        <span class="text-[10px] font-bold">Profile</span>
    </button>
</div>

<!-- Card hover: rendered outside columns (see builder deck list) to fix column stacking / bleed-through -->
<div id="card-hover-portal"
     class="fixed left-0 top-0 z-[9999] pointer-events-none hidden isolate"
     style="isolation: isolate;"
     aria-live="polite"></div>

<script defer src="https://unpkg.com/htmx.org/dist/htmx.min.js"></script>
<script th:src="@{/js/chart.min.js}"></script>
<script th:inline="javascript">
    window.__MTG_MANA_CURVE__ = {
        data: /*[[${manaCurveData}]]*/ [],
        labels: /*[[${manaCurveLabels}]]*/ []
    };
    window.__MTG_COLOR_PRODUCTION__ = {
        data: /*[[${colorProductionData}]]*/ [],
        labels: /*[[${colorProductionLabels}]]*/ []
    };
</script>
<script type="module" th:src="@{/js/mana-distribution.js}"></script>

<script>
    document.addEventListener('click', function (event) {
        var toggle = event.target.closest('.builder-card-actions-toggle');
        var insideActions = event.target.closest('.builder-card-actions-drop');
        var openDrops = document.querySelectorAll('.builder-card-actions-drop');

        if (insideActions) return;

        if (toggle) {
            var drop = toggle.nextElementSibling;
            var isOpen = drop && drop.innerHTML.trim().length > 0;
            openDrops.forEach(function (openDrop) {
                if (openDrop !== drop) openDrop.innerHTML = '';
            });
            if (isOpen) {
                event.preventDefault();
                event.stopImmediatePropagation();
                drop.innerHTML = '';
            }
            return;
        }

        openDrops.forEach(function (drop) { drop.innerHTML = ''; });
    }, true);

    document.addEventListener('htmx:configRequest', function (event) {
        var csrfMeta = document.querySelector('meta[name="_csrf"]');
        var hdrMeta = document.querySelector('meta[name="_csrf_header"]');
        if (csrfMeta && hdrMeta) {
            var t = csrfMeta.getAttribute('content');
            var h = hdrMeta.getAttribute('content');
            if (t && h) event.detail.headers[h] = t;
        }
    });

    (function builderViewOptionsModal() {
        var modal = document.getElementById('builder-view-options-modal');
        var openBtn = document.getElementById('builder-open-view-options');
        var saveBtn = document.getElementById('builder-view-options-save');
        var resetBtn = document.getElementById('builder-view-options-reset');
        var viewStyleInput = document.getElementById('builder-deck-layout-view-style-input');
        if (!modal || !openBtn || !saveBtn || !viewStyleInput) return;

        function storageKey(deckId) {
            return 'mtg-builder-view:' + deckId;
        }

        function defaultPrefs() {
            return { viewStyle: 'text', groupBy: 'type', sortBy: 'name', extras: [] };
        }

        function readPrefs(deckId) {
            try {
                var raw = localStorage.getItem(storageKey(deckId));
                if (!raw) return defaultPrefs();
                var parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object') return defaultPrefs();
                var out = defaultPrefs();
                if (parsed.viewStyle) out.viewStyle = parsed.viewStyle;
                if (parsed.groupBy) out.groupBy = parsed.groupBy;
                if (parsed.sortBy) out.sortBy = parsed.sortBy;
                if (Array.isArray(parsed.extras)) out.extras = parsed.extras.slice();
                return out;
            } catch (err) {
                return defaultPrefs();
            }
        }

        function writePrefs(deckId, prefs) {
            localStorage.setItem(storageKey(deckId), JSON.stringify(prefs));
        }

        function getDeckId() {
            return modal.getAttribute('data-deck-id') || '';
        }

        function selectedRadioValue(groupId) {
            var sel = document.querySelector('#' + groupId + ' .pill.selected');
            return sel ? sel.getAttribute('data-val') : null;
        }

        function setRadioGroup(groupId, value) {
            var root = document.getElementById(groupId);
            if (!root) return;
            root.querySelectorAll('.pill').forEach(function (pill) {
                var v = pill.getAttribute('data-val');
                pill.classList.toggle('selected', v === value);
            });
        }

        function readExtrasFromModal() {
            var out = [];
            document.querySelectorAll('#builder-extra-data .pill.selected').forEach(function (pill) {
                var v = pill.getAttribute('data-val');
                if (v) out.push(v);
            });
            return out;
        }

        function applyPrefsToModal(prefs) {
            setRadioGroup('builder-view-style', prefs.viewStyle || 'text');
            setRadioGroup('builder-group-by', prefs.groupBy || 'type');
            setRadioGroup('builder-sort-by', prefs.sortBy || 'name');
            document.querySelectorAll('#builder-extra-data .pill').forEach(function (pill) {
                var v = pill.getAttribute('data-val');
                pill.classList.toggle('selected', (prefs.extras || []).indexOf(v) >= 0);
            });
        }

        function readPrefsFromModal() {
            var groupBy = selectedRadioValue('builder-group-by') || 'type';
            var sortBy = selectedRadioValue('builder-sort-by') || 'name';
            var viewStyle = selectedRadioValue('builder-view-style') || 'text';
            return {
                viewStyle: viewStyle,
                groupBy: groupBy,
                sortBy: sortBy,
                extras: readExtrasFromModal()
            };
        }

        function syncHiddenViewStyle(viewStyle) {
            viewStyleInput.value = viewStyle || 'text';
        }

        function syncDeckLayoutInputs(prefs) {
            var fn = window.__BUILDER_SYNC_DECK_LAYOUT_HIDDENS__;
            if (typeof fn === 'function') {
                fn(prefs || {});
            } else {
                syncHiddenViewStyle((prefs || {}).viewStyle);
            }
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function openModal() {
            applyPrefsToModal(readPrefs(getDeckId()));
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        openBtn.addEventListener('click', function () {
            openModal();
        });

        modal.addEventListener('click', function (e) {
            if (e.target.closest('[data-builder-view-options-dismiss="true"]')) {
                closeModal();
                return;
            }
            var pill = e.target.closest('[data-builder-radio-group] .pill');
            if (pill) {
                var group = pill.closest('[data-builder-radio-group]');
                group.querySelectorAll('.pill').forEach(function (p) {
                    p.classList.remove('selected');
                });
                pill.classList.add('selected');
                return;
            }
            var checkPill = e.target.closest('#builder-extra-data .pill');
            if (checkPill) checkPill.classList.toggle('selected');
        });

        saveBtn.addEventListener('click', function () {
            var deckId = getDeckId();
            var prefs = readPrefsFromModal();
            writePrefs(deckId, prefs);
            syncDeckLayoutInputs(prefs);
            closeModal();
            htmx.trigger(document.body, 'builderViewChanged');
        });

        if (resetBtn) {
            resetBtn.addEventListener('click', function () {
                applyPrefsToModal(defaultPrefs());
            });
        }
    })();

    (function () {
        var PORTAL_ID = 'card-hover-portal';

        function getPortal() {
            return document.getElementById(PORTAL_ID);
        }

        function positionCardHoverPortal(portal, row) {
            var gap = 16;
            var estimatedWidth = 400;
            if (portal && portal.firstElementChild) {
                var w = portal.firstElementChild.getBoundingClientRect().width;
                if (w && w > 120) estimatedWidth = w;
            }

            var rect = row.getBoundingClientRect();

            portal.style.bottom = '';
            portal.style.right = '';

            /* Fixed positioning: viewport coordinates only. */
            if (rect.right + gap + estimatedWidth <= window.innerWidth - gap) {
                portal.style.left = (rect.right + gap) + 'px';
            } else if (rect.left - gap - estimatedWidth >= gap) {
                portal.style.left = (rect.left - gap - estimatedWidth) + 'px';
            } else {
                portal.style.left = Math.max(gap, (window.innerWidth - estimatedWidth) / 2) + 'px';
            }

            portal.style.top = Math.max(gap, rect.top) + 'px';
        }

        function hideCardHoverPortal() {
            var portal = getPortal();
            if (!portal) return;
            portal.classList.add('hidden');
            portal.innerHTML = '';
        }

        document.addEventListener('htmx:afterSwap', function (event) {
            var detail = event.detail;
            var swapTarget = detail.target;
            // HTMX sets detail.elt to each swapped descendant (portal content); use requestConfig for the HX trigger.
            if (!swapTarget || swapTarget.id !== PORTAL_ID) return;

            var sourceElt =
                detail.requestConfig && detail.requestConfig.elt ? detail.requestConfig.elt : null;
            var row = sourceElt && sourceElt.closest && sourceElt.closest('.builder-deck-card-row');
            var portal = getPortal();

            if (!portal || portal !== swapTarget || !row || !row.matches(':hover')) {
                hideCardHoverPortal();
                return;
            }

            portal.classList.remove('hidden');
            positionCardHoverPortal(portal, row);
        });

        document.addEventListener('mouseout', function (e) {
            var row = e.target.closest && e.target.closest('.builder-deck-card-row');
            if (!row) return;
            var related = e.relatedTarget;
            if (related && row.contains(related)) return;
            hideCardHoverPortal();
        }, true);

        function repositionIfVisible() {
            var portal = getPortal();
            if (!portal || portal.classList.contains('hidden')) return;
            var row = document.querySelector('.builder-deck-card-row:hover');
            if (!row) {
                hideCardHoverPortal();
                return;
            }
            positionCardHoverPortal(portal, row);
        }

        window.addEventListener('scroll', repositionIfVisible, true);
        window.addEventListener('resize', repositionIfVisible);
    })();
</script>
</body>
</html>
