<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<div style="columns: 3; column-gap: 3rem;" th:fragment="type-layout"
     class="min-w-0 max-w-full text-on-background">

    <section th:each="sec : ${layout.deckSections()}"
             class="space-y-4"
             style="break-inside: avoid; margin-bottom: 2.5rem;"
             th:attr="aria-label=${sec.title}">

        <div class="flex justify-between items-baseline mb-2 gap-4">
            <h2 class="text-xl font-black text-on-background flex flex-wrap items-baseline gap-2">
                <span th:text="${sec.title}">Section</span>
                <span class="text-slate-600 font-medium"
                      th:text="${#lists.size(sec.cards)}">0</span>
            </h2>
            <span class="text-[10px] font-bold text-slate-600 tracking-widest uppercase whitespace-nowrap"
                  th:if="${layout.deckListCondensed() eq true}">
                Condensed
            </span>
        </div>

        <div th:classAppend="${layout.deckListCondensed() eq true} ? ' space-y-1' : ' space-y-2'"
             class="">
            <th:block th:each="card : ${sec.cards}">
                <th:block th:replace="~{builder/deck-list-row-text :: textRowDeck(${card})}"/>
            </th:block>

            <div class="text-sm text-slate-600 py-3"
                 th:if="${#lists.isEmpty(sec.cards)}">
                No cards in this group.
            </div>
        </div>
    </section>
</div>
</body>
</html>
