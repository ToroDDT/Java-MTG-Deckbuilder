<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<div class="max-w-full min-w-0 bg-white/[.92] backdrop-blur-md rounded-3xl p-6 sm:p-8
            border border-[rgba(194,198,214,.55)]
            shadow-[0_20px_40px_rgba(25,27,35,.06)]
            space-y-10"
     th:fragment="type-layout">

    <section th:each="sec : ${layout.deckSections()}" class="space-y-6">

        <header class="flex flex-wrap gap-4 justify-between items-baseline pb-3 border-b border-outline-variant">
            <h2 class="text-xl font-black text-on-background flex gap-3 items-center">
                <span th:text="${sec.title}">Section</span>
                <span class="text-base font-semibold text-on-surface-variant"
                      th:text="${#lists.size(sec.cards)}">0</span>
            </h2>
            <span class="text-[10px] font-bold text-on-surface-variant tracking-[0.28em] uppercase"
                  th:text="${layout.deckVisualSplit() eq true} ? 'Split columns' : 'Wrapped stacks'">Stacks</span>
        </header>

        <p class="text-sm text-on-surface-variant"
           th:if="${#lists.isEmpty(sec.cards)}">No cards in this group.</p>

        <!-- Split stacks use CSS columns so tall sections balance across the panel. -->

        <div th:if="${!#lists.isEmpty(sec.cards)}"
             class="transition-[column-count]"
             th:class="${layout.deckVisualSplit() eq true}
                        ? 'xl:columns-2 xl:[column-gap:3.25rem]'
                        : 'flex flex-wrap gap-5'">

            <div class="builder-deck-card-row flex flex-col items-center gap-3 w-[7.75rem]
                        rounded-xl p-2 mb-8 last:mb-0
                        hover:bg-surface-container-highest transition-colors cursor-pointer ring-1 ring-transparent
                        hover:ring-blue-400/35
                        xl:mb-6 xl:break-inside-avoid xl:w-[8.125rem]"
                 th:classAppend="${layout.deckVisualSplit() eq false} ? ' shrink-0' : ''"
                 th:each="card : ${sec.cards}">
                <div class="relative w-full rounded-lg overflow-hidden shadow-md ring-1 ring-black/10 bg-surface-dim"
                     style="aspect-ratio: 226/311;">
                    <img th:if="${card.previewImageUrl != null}"
                         th:src="${card.previewImageUrl}"
                         th:alt="${card.name}"
                         class="absolute inset-0 h-full w-full object-cover"
                         loading="lazy" width="155" height="216" decoding="async"/>
                    <div th:if="${card.previewImageUrl == null}"
                         class="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-slate-400 to-slate-600 p-2 text-center">
                        <span class="text-[10px] font-bold text-white leading-tight line-clamp-4 break-words"
                              th:text="${card.name}">
                            Name
                        </span>
                    </div>
                </div>
                <div class="flex flex-col gap-2 w-full text-center px-px">
                    <div class="flex w-full justify-center gap-1">
                        <span class="text-xs font-bold text-slate-600 shrink-0 mt-px">1</span>
                        <th:block th:replace="~{builder/deck-card-name :: builderDeckRowCardName(${card}, ${layout.builderView().deckId()})}"/>
                    </div>
                    <th:block th:replace="~{builder/deck-list-row-text :: extrasStripCenter(${card})}"/>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
