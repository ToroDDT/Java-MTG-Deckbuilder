<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
<div class="space-y-10" th:fragment="type-layout">

  <!-- Creatures -->
  <div class="space-y-4">
    <div class="flex justify-between items-baseline mb-2">
      <h2 class="text-xl font-black text-on-background flex items-center gap-2">
        Creatures <span class="text-slate-600 font-medium" th:text="${#lists.size(builderView.creatures)}">0</span>
      </h2>
      <span class="text-[10px] font-bold text-slate-600 tracking-widest uppercase">Avg CMC: 3.2</span>
    </div>
    <div class="flex flex-wrap gap-4 items-start">
      <div class="builder-deck-card-row flex flex-col items-center gap-2 w-[7.75rem] shrink-0 rounded-xl p-2 hover:bg-surface-container-highest transition-colors cursor-pointer"
           th:each="card : ${builderView.creatures}">
        <div class="relative w-full rounded-lg overflow-hidden shadow-md ring-1 ring-black/10 bg-slate-200"
             style="aspect-ratio: 226/311;">
          <img th:if="${card.previewImageUrl() != null}"
               th:src="${card.previewImageUrl()}"
               th:alt="${card.name}"
               class="absolute inset-0 h-full w-full object-cover"
               loading="lazy" width="155" height="216" decoding="async"/>
          <div th:if="${card.previewImageUrl() == null}"
               class="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-slate-400 to-slate-600 p-2 text-center">
            <span class="text-[10px] font-bold text-white leading-tight line-clamp-4" th:text="${card.name}">Name</span>
          </div>
        </div>
        <div class="flex w-full items-start justify-center gap-1 text-center">
          <span class="text-xs font-bold text-slate-600 shrink-0">1</span>
          <th:block th:replace="~{builder/deck-card-name :: builderDeckRowCardName(${card}, ${builderView.deckId})}"/>
        </div>
      </div>
      <div class="text-sm text-slate-600 w-full" th:if="${#lists.isEmpty(builderView.creatures)}">No creatures found.</div>
    </div>
  </div>
