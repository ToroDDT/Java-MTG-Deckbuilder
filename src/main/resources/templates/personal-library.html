<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Deckbuilder — Card Browser</title>

    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="preconnect" href="https://cards.scryfall.io">
  <link rel="preload" href="https://rsms.me/inter/font-files/InterVariable.woff2?v=4.1" as="font" type="font/woff2" crossorigin>
  <link rel="preload" th:href="@{/css/library.min.css}" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" th:href="@{/css/library.min.css}"></noscript>
</head>
<body>

<div th:replace="~{fragments/nav-bar:: nav}"></div>

<!-- ══════════════ PAGE ══════════════ -->
<main class="cb-page">

  <!-- Page header -->
  <div class="cb-page-header">
    <div class="cb-page-header-bg"></div>
    <h1 class="cb-page-title">Card Browser</h1>
    <p class="cb-page-sub">Browse all cards with filters and search.</p>
  </div>

  <div class="cb-layout">
    <aside class="cb-sidebar">
      <div class="cb-sidebar-title" style="margin-top: 1.5rem;">Add Card</div>

      <form th:action="@{/personal-library/add}" th:object="${ownedCard}" method="post" id="addCardForm">

        <div class="cb-filter-section">
          <label for="card-name" class="cb-filter-label">Card Name</label>
          <div class="cb-search-wrap">
            <svg class="cb-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="cb-search-input"
                   id="card-name"
                   name="query"
                   type="text"
                   placeholder="Search cards to add..."
                   autocomplete="off"
                   th:attr="hx-get=@{/personal-library/card-query}"
                   hx-trigger="input changed delay:200ms"
                   hx-target="#card-query-results"
                   hx-swap="innerHTML" />
          </div>
          <div id="card-query-results"
               th:insert="~{card-query :: card-results}">
          </div>
        </div>

      </form>

      <form th:action="@{/personal-library/scan}"
            method="post"
            enctype="multipart/form-data"
            id="scanCardForm"
            hx-post="/personal-library/scan"
            hx-encoding="multipart/form-data"
            hx-target="#card-query-results"
            hx-swap="innerHTML">
        <div class="cb-filter-section">
          <label for="scan-file" class="cb-filter-label">Scan Card Image</label>
          <input id="scan-file"
                 name="file"
                 type="file"
                 accept="image/png,image/jpeg,image/jpg,image/webp"
                 class="cb-search-input" />
          <button type="submit"
                  class="cb-btn-apply"
                  style="margin-top: 0.75rem; width: 100%;">
            Scan And Add
          </button>
        </div>
      </form>

      <form th:action="@{/personal-library/search}"
            th:hx-get="@{/personal-library/search}"
            id="librarySearchForm"
            hx-sync="this:replace"
            hx-trigger="input delay:300ms, submit, refreshLibrary from:body"
            hx-target="#personal-cards"
            th:object="${filters}">

        <div class="cb-sidebar-title">Filters</div>
        <div></div>

        <input type="hidden" id="operator" name="operator" value="" />

        <input type="hidden" id="lastId" name="dateAdded" />

        <input type="hidden" id="page" name="page" value="0" />

        <div class="cb-filter-section">
          <label for="searchInput" class="cb-filter-label">Search</label>
          <div class="cb-search-wrap">
            <svg class="cb-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input hx-trigger="change" th:field="*{cardName}" class="cb-search-input" id="searchInput" type="text" placeholder="Search cards..." autocomplete="off" />
          </div>
        </div>

        <div class="cb-filter-section">


        <div class="cb-filter-section">
          <label for="tagSearchInput" class="cb-filter-label">Tags</label>
          <div class="cb-search-wrap">
            <svg class="cb-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input hx-trigger="change" th:field="*{tagSearch}" class="cb-search-input" id="tagSearchInput" type="text" placeholder="Tags (e.g. ramp, recursion)..." autocomplete="off" />
          </div>
        </div>

        <div class="cb-filter-section">
          <span class="cb-filter-label">Color</span>
          <div class="cb-color-row">

            <div class="pip-container flex flex-wrap gap-2" id="color-row">

              <input hx-trigger="change"   type="checkbox" th:field="*{selectedColors}" value="W" id="colorW" style="display:none;">
              <label onclick="toggleWhite(this)" for="colorW" id="whiteToggle" class="pip w-9 h-9 rounded-full border-2 text-[13px] font-bold cursor-pointer transition-all
                flex items-center justify-center hover:scale-110 active:scale-95
                bg-[#f9f6ee] text-[#6b6245] border-[#c8b97e] opacity-40" >W</label>

              <input hx-trigger="change" type="checkbox" th:field="*{selectedColors}" value="U" id="colorU" style="display:none;">
              <label onclick="toggleBlue(this)" for="colorU" id="blueToggle" class="pip w-9 h-9 rounded-full border-2 text-[13px] font-bold cursor-pointer transition-all
                flex items-center justify-center hover:scale-110 active:scale-95
                bg-[#0e68ab] text-[#d4edff] border-[#0e68ab] opacity-40" >U</label>

              <input type="checkbox" th:field="*{selectedColors}" value="B" id="colorB" style="display:none;">
              <label onclick="toggleBlack(this)" for="colorB" id="blackToggle" class="pip w-9 h-9 rounded-full border-2 text-[13px] font-bold cursor-pointer transition-all
                flex items-center justify-center hover:scale-110 active:scale-95
                bg-gray-800 text-[#d4edff] border-[#0e68ab] opacity-40">B</label>

              <input type="checkbox" th:field="*{selectedColors}" value="R" id="colorR" style="display:none;">
              <label onclick="toggleRed(this)" for="colorR" id="redToggle"  class="pip w-9 h-9 rounded-full border-2 text-[13px] font-bold cursor-pointer transition-all
                flex items-center justify-center hover:scale-110 active:scale-95
                bg-red-700 text-[#d4edff] border-[#0e68ab] opacity-40" >R</label>

              <input type="checkbox" th:field="*{selectedColors}" value="G" id="colorG" style="display:none;">
              <label onclick="toggleGreen(this)" for="colorG" id="greenToggle" class="pip w-9 h-9 rounded-full border-2 text-[13px] font-bold cursor-pointer transition-all
                flex items-center justify-center hover:scale-110 active:scale-95
                bg-green-900 text-[#d4edff] border-[#0e68ab] opacity-40" >G</label>
            </div>

          </div>

        </div>
          <label for="searchOracleText" class="cb-filter-label">Oracle Text</label>
          <div class="cb-search-wrap">
            <svg class="cb-search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input hx-trigger="change" th:field="*{oracleTextSearch}" class="cb-search-input" id="searchOracleText" type="text" placeholder="Search oracle text..." autocomplete="off" />
          </div>
        </div>


        <div class="cb-filter-section">
          <label for="typeFilter" class="cb-filter-label">Type</label>
          <select hx-trigger="change" th:field="*{cardType}"  class="cb-select" id="typeFilter">
            <option th:value="All"> All Types</option>
            <option th:value="Artifact">Artifact</option>
            <option th:value="Creature">Creature</option>
            <option th:value="Enchantment">Enchantment</option>
            <option th:value="Instant">Instant</option>
            <option th:value="Land">Land</option>
            <option th:value="Legendary">Legendary</option>
            <option th:value="Sorcery">Sorcery</option>
            <option th:value="Vehicle">Vehicle</option>
          </select>
        </div>

        <!-- CMC Range -->
        <div class="cb-filter-section">
          <span class="cb-filter-label">CMC Range</span>
          <div class="cb-range-group">
            <div class="cb-range-row">
              <label for="cmcMin" class="cb-range-lbl">Min</label>
              <input hx-trigger="change" th:field="*{minCMC}" type="range" class="cb-range-input" id="cmcMin" min="0" max="16" value="0" />
              <span class="cb-range-val" id="cmcMinVal">0</span>
            </div>
            <div class="cb-range-row">
              <label for="cmcMax" class="cb-range-lbl">Max</label>
              <input hx-trigger="change" th:field="*{maxCMC}" type="range" class="cb-range-input" id="cmcMax" min="0" max="16" value="16" />
              <span class="cb-range-val" id="cmcMaxVal">∞</span>
            </div>
          </div>
        </div>

        <!-- Sort -->
        <div class="cb-filter-section">
          <label for="sortBy" class="cb-filter-label">Sort By</label>
          <select hx-trigger="change" th:field="*{sortBy}" class="cb-select" id="sortBy">
            <option th:each="option : ${personalLibrary.sortOptions}"
                    th:value="${option}"
                    th:text="${option.getSortType()}">
            </option>
          </select>
        </div>

        <div class="cb-btn-row">
          <button class="cb-btn-apply" id="clearBtn" onclick="">Clear</button>
        </div>

      </form>

      <!-- ══════ Add Card ══════ -->


    </aside>

    <div id="personal-cards" class="cb-results-col rounded-2xl">


      <div class="cb-results-header">
        <p class="cb-count">Showing <span id="visibleCount">0</span> of <span id="totalCount">0</span> cards</p>
      </div>

      <div class="cb-grid" id="cardGrid">

        <div class="cb-empty">
          <div class="cb-empty-icon">🃏</div>
          <p>No cards in your library yet.</p>
        </div>

        <div th:attr="hx-get=@{/personal-library/cards}"
             hx-trigger="load"
             hx-target="#personal-cards">
          Loading details...
        </div>

      </div>

      <div class="cb-load-more" id="loadMoreWrap" style="display:none">
        <button class="cb-btn-load" id="loadMoreBtn">Load More</button>
      </div>

    </div>
  </div>

</main>


<!-- ══════════════ FOOTER ══════════════ -->
<footer class="cb-footer">
  <p>Card images and data provided by <a href="https://scryfall.com" target="_blank" rel="noopener noreferrer">Scryfall</a>. Not affiliated with Scryfall or Wizards of the Coast.</p>
</footer>
<div hx-get="/personal-library/info"
     hx-trigger="load"
     hx-swap="outerHTML">
</div>
<div id="personal-cards-info"></div>
<script th:src="@{/js/htmx.min.js}" defer></script>
<script th:src="@{/js/library.min.js}" defer></script>
</body>
</html>
