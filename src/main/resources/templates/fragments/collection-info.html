<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title></title>
</head>
<body class="p-8 bg-[#f1f5fe] font-[Inter]">

<!-- ── STICKY STATS BAR FRAGMENT ── -->
<div th:fragment="stickyStatsBar">
  <!-- Spacer so page content isn't hidden behind the bar -->
  <div class="h-20"></div>

<div id="stickyStatsBar"
     hx-get="/personal-library/info"
     hx-trigger="refreshStats from:body"
     hx-swap="outerHTML"
     class="fixed bottom-0 left-0 right-0 z-[500] border-t border-[#e2e8f8] rounded-md"
     style="background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 -4px 28px rgba(37,99,235,0.10);">

    <div class="max-w-[1400px] mx-auto px-4 md:px-6 h-16 flex items-center gap-3 md:gap-4">

      <!-- Label -->
      <span class="hidden sm:block text-[10px] font-bold uppercase tracking-widest text-slate-400 shrink-0">
        Colors
      </span>

      <!-- ── Color chips ── -->
      <div class="flex items-center gap-1.5 md:gap-2">

        <!-- White -->
        <div class="flex items-center gap-1.5 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-2.5 py-1.5 hover:border-blue-200 hover:bg-blue-50 transition-all cursor-default">
          <span class="w-[22px] h-[22px] rounded-full flex items-center justify-center text-[10px] font-bold shrink-0
                       bg-[#f9f6ee] text-[#6b6245] border-2 border-[#c8b97e]">W</span>
          <span class="text-[13px] font-bold text-slate-800"
                id="countW"
                th:text="${personalLibrary.colorIdentityAmounts != null ? personalLibrary.colorIdentityAmounts['WHITE'] : 0}">14</span>
          <span th:text="${personalLibrary.colorIdentityAmounts != null and personalLibrary.totalCards > 0
    ? #numbers.formatDecimal((personalLibrary.colorIdentityAmounts['WHITE'] ?: 0) * 100.0 / personalLibrary.totalCards, 1, 1) + '%'
    : '0%'}" class="hidden md:inline text-[11px] text-slate-400" id="pctW">22%</span>
        </div>

        <!-- Blue -->
        <div class="flex items-center gap-1.5 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-2.5 py-1.5 hover:border-blue-200 hover:bg-blue-50 transition-all cursor-default">
          <span class="w-[22px] h-[22px] rounded-full flex items-center justify-center text-[10px] font-bold shrink-0
                       bg-[#0e68ab] text-[#d4edff] border-2 border-[#0e68ab]">U</span>
          <span class="text-[13px] font-bold text-slate-800"
                id="countU"
                th:text="${personalLibrary.colorIdentityAmounts != null ? personalLibrary.colorIdentityAmounts['BLUE'] : 0}">22</span>
          <span th:text="${personalLibrary.colorIdentityAmounts != null and personalLibrary.totalCards > 0
    ? #numbers.formatDecimal((personalLibrary.colorIdentityAmounts['BLUE'] ?: 0) * 100.0 / personalLibrary.totalCards, 1, 1) + '%'
    : '0%'}" class="hidden md:inline text-[11px] text-slate-400" id="pctU">35%</span>
        </div>

        <!-- Black -->
        <div class="flex items-center gap-1.5 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-2.5 py-1.5 hover:border-blue-200 hover:bg-blue-50 transition-all cursor-default">
          <span class="w-[22px] h-[22px] rounded-full flex items-center justify-center text-[10px] font-bold shrink-0
                       bg-gray-800 text-[#d4edff] border-2 border-slate-600">B</span>
          <span class="text-[13px] font-bold text-slate-800"
                id="countB"
                th:text="${personalLibrary.colorIdentityAmounts != null ? personalLibrary.colorIdentityAmounts['BLACK'] : 0}">18</span>
          <span th:text="${personalLibrary.colorIdentityAmounts != null and personalLibrary.totalCards > 0
    ? #numbers.formatDecimal((personalLibrary.colorIdentityAmounts['BLACK'] ?: 0) * 100.0 / personalLibrary.totalCards, 1, 1) + '%'
    : '0%'}" class="hidden md:inline text-[11px] text-slate-400" id="pctB">29%</span>
        </div>

        <!-- Red -->
        <div class="flex items-center gap-1.5 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-2.5 py-1.5 hover:border-blue-200 hover:bg-blue-50 transition-all cursor-default">
          <span class="w-[22px] h-[22px] rounded-full flex items-center justify-center text-[10px] font-bold shrink-0
                       bg-red-700 text-red-100 border-2 border-red-700">R</span>
          <span class="text-[13px] font-bold text-slate-800"
                id="countR"
                th:text="${personalLibrary.colorIdentityAmounts != null ? personalLibrary.colorIdentityAmounts['RED'] : 0}">7</span>
          <span th:text="${personalLibrary.colorIdentityAmounts != null and personalLibrary.totalCards > 0
    ? #numbers.formatDecimal((personalLibrary.colorIdentityAmounts['RED'] ?: 0) * 100.0 / personalLibrary.totalCards, 1, 1) + '%'
    : '0%'}" class="hidden md:inline text-[11px] text-slate-400" id="pctR">11%</span>
        </div>

        <!-- Green -->
        <div class="flex items-center gap-1.5 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-2.5 py-1.5 hover:border-blue-200 hover:bg-blue-50 transition-all cursor-default">
          <span class="w-[22px] h-[22px] rounded-full flex items-center justify-center text-[10px] font-bold shrink-0
                       bg-green-900 text-green-100 border-2 border-green-700">G</span>
          <span class="text-[13px] font-bold text-slate-800"
                id="countG"
                th:text="${personalLibrary.colorIdentityAmounts != null ? personalLibrary.colorIdentityAmounts['GREEN'] : 0}">12</span>
          <span th:text="${personalLibrary.colorIdentityAmounts != null and personalLibrary.totalCards > 0
    ? #numbers.formatDecimal((personalLibrary.colorIdentityAmounts['GREEN'] ?: 0) * 100.0 / personalLibrary.totalCards, 1, 1) + '%'
    : '0%'}" class="hidden md:inline text-[11px] text-slate-400" id="pctG">19%</span>
        </div>

      </div>

      <!-- Divider -->
      <div class="hidden sm:block w-px h-8 bg-[#e2e8f8] shrink-0"></div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- ── Pricing block ── -->
      <div class="flex items-center gap-3 bg-[#f8faff] border border-[#e2e8f8] rounded-[9px] px-3.5 py-1.5 shrink-0">
        <div>
          <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total Value</div>
          <div class="text-[18px] font-extrabold leading-tight grad-text"
               id="totalPrice"
               th:text="${personalLibrary.totalValue != null ? '$' + #numbers.formatDecimal(personalLibrary.totalValue, 1, 2) : '$0.00'}">
            $214.87
          </div>
        </div>

        <div class="w-px h-8 bg-[#e2e8f8]"></div>
        <div>
          <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total Cards</div>
          <div class="text-[18px] font-extrabold leading-tight grad-text"
               id="totalCards"
               th:text="${personalLibrary.totalCards != null ? 'Total: ' + personalLibrary.totalCards : '10'}">
            10
          </div>
        </div>

        <!-- Sub-divider -->
        <div class="w-px h-8 bg-[#e2e8f8]"></div>

        <div class="flex flex-col items-end">
          <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Avg / card</span>
          <span class="text-[13px] font-bold text-blue-600"
                id="avgPrice"
                th:text="${personalLibrary.avgPrice != null ? '$' + #numbers.formatDecimal(personalLibrary.avgPrice, 1, 2) : '$0.00'}">
            $3.41
          </span>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <button
                id="prevBtn"
                class="group inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-[#d7e3fb] bg-[#f8faff] text-[22px] font-semibold text-[#2563eb] shadow-[0_8px_20px_rgba(37,99,235,0.10)] transition-all hover:-translate-y-[1px] hover:border-[#bfdbfe] hover:bg-white hover:text-[#1d4ed8] disabled:cursor-not-allowed disabled:opacity-45 disabled:hover:translate-y-0"
                aria-label="Previous page"
        >
          <span class="pointer-events-none transition-transform group-hover:-translate-x-px">&lt;</span>
        </button>

        <button
                id="nextBtn"
                class="group inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-transparent grad-bg text-[22px] font-semibold text-white shadow-[0_10px_24px_rgba(37,99,235,0.22)] transition-all hover:-translate-y-[1px] hover:shadow-[0_14px_28px_rgba(37,99,235,0.28)]"
                aria-label="Next page"
        >
          <span class="pointer-events-none transition-transform group-hover:translate-x-px">&gt;</span>
        </button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
