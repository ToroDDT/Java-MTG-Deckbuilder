<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="builderDeckRowCardName(card, deckId)">
    <span class="relative inline-flex items-center gap-1.5 text-left">
        <span class="group relative inline-block">
            <span class="cursor-default border-b border-dotted border-transparent text-sm font-medium text-on-surface transition-colors hover:border-blue-400 hover:text-blue-700"
                  th:text="${card['name']}"
                  th:attr="hx-get=@{/builder/deck/{d}/deck-entry/{e}/hover(d=${deckId},e=${card['deck_entry_id']})},
                           hx-trigger='mouseenter delay:120ms throttle:750ms',
                           hx-target='next .builder-card-hover-drop',
                           hx-swap='innerHTML'">
                Card Name
            </span>
            <div class="builder-card-hover-drop pointer-events-none invisible absolute bottom-full left-0 z-[200] pb-2 opacity-0 transition-[opacity] duration-150 ease-out group-hover:pointer-events-auto group-hover:visible group-hover:opacity-100"></div>
        </span>
        <button type="button"
                class="builder-card-actions-toggle inline-flex h-5 w-5 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-500 shadow-sm transition-colors hover:border-blue-300 hover:text-blue-700"
                aria-label="Card actions"
                th:attr="hx-get=@{/builder/deck/{d}/deck-entry/{e}/actions(d=${deckId},e=${card['deck_entry_id']})},
                         hx-trigger='click',
                         hx-target='next .builder-card-actions-drop',
                         hx-swap='innerHTML'">
            <span class="material-symbols-outlined text-[16px] leading-none">keyboard_arrow_down</span>
        </button>
        <div class="builder-card-actions-drop absolute left-full top-6 z-[210] ml-2"></div>
    </span>
</th:block>
</body>
</html>
