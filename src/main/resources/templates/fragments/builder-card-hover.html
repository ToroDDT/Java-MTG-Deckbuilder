<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<th:block th:fragment="hoverPanel">
    <div th:if="${hover == null}" class="rounded-2xl border border-zinc-700 bg-zinc-950 p-4 text-xs text-zinc-500 shadow-2xl">
        Preview unavailable.
    </div>
    <div th:if="${hover != null}"
         class="builder-card-hover-panel flex max-w-lg gap-4 overflow-hidden rounded-2xl border border-zinc-700 bg-zinc-950 p-3 shadow-2xl">
        <div class="h-[280px] w-[200px] shrink-0 overflow-hidden rounded-xl bg-zinc-900">
            <img th:if="${hover.imageUrl() != null}"
                 loading="lazy"
                 th:alt="${hover.cardName()}"
                 th:src="${hover.imageUrl()}"
                 class="h-full w-full object-cover"/>
        </div>
        <div class="flex min-w-[10rem] max-w-[12rem] flex-col gap-2">
            <div class="text-[10px] font-bold uppercase tracking-widest text-zinc-500">Tags</div>
            <ul class="m-0 max-h-72 list-none space-y-1.5 overflow-y-auto p-0 text-sm leading-snug text-zinc-200">
                <li th:if="${#lists.isEmpty(hover.tags())}" class="text-zinc-500 italic">No tags</li>
                <li th:each="tag : ${hover.tags()}" th:text="${tag}">Tag</li>
            </ul>
        </div>
    </div>
</th:block>

</body>
</html>
