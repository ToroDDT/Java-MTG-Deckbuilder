<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Load swap overrides only after FA CSS is applied (FA uses font-display: block). -->
<th:block th:fragment="stylesheet-async">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        media="print"
        th:attr="data-fa-display-swap=@{/css/font-awesome-display-swap.css}"
        onload="this.media='all'; this.onload=null; var h=this.dataset.faDisplaySwap; if (h) { var l=document.createElement('link'); l.rel='stylesheet'; l.href=h; document.head.appendChild(l); }">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/font-awesome-display-swap.css}">
  </noscript>
</th:block>
</body>
</html>
