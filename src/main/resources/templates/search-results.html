<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - MTG Deckbuilder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .results-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card-item {
            background-color: var(--surface-color);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .card-item h4 {
            margin: 0.5rem 0;
        }
        .card-item p {
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a th:href="@{/}" style="color: inherit; text-decoration: none;">MTG DECKBUILDER</a></div>
        <nav>
            <a th:href="@{/dashboard}">Dashboard</a>
        </nav>
    </header>

    <main class="results-container">
        <h2>Search Results for "<span th:text="${query}">query</span>"</h2>
        
        <div th:if="${results.isEmpty()}" style="margin-top: 2rem;">
            <p>No cards found matching your search.</p>
        </div>

        <div class="card-grid">
            <div th:each="card : ${results}" class="card-item">
                <h4 th:text="${card.name}">Card Name</h4>
                <p th:text="${card.type_line}">Type Line</p>
                <p th:text="${card.mana_cost}">Mana Cost</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MTG Deckbuilder. Not affiliated with Wizards of the Coast.</p>
    </footer>
</body>
</html>
