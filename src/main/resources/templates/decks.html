<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deck Browser - MTG Deckbuilder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/decks.css}">
    <!-- HTML in your document's head -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">
</head>
<body>
<div th:replace="fragments/nav-bar.html :: header"></div>
    <main class="main">
        <div class="deck-container">
            <div class="deck-header">
                <h1>Your Decks</h1>
                <p>Browse and search your Magic: The Gathering decks</p>
            </div>

            <form th:action="@{/search}" th:hx-get="@{/search}"  hx-target="#search-results" method="get" th:object="${deckSearchCriteria}" hx-trigger="input delay:100ms, change">
                <div class="filter-section">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" th:field="*{searchQuery}" placeholder="Search decks by name..." class="search-input">
                    </div>

                    <div class="filter-controls">
                        <div class="filter-group">
                            <label class="filter-label">Filter by Colors</label>
                            <div class="flex-wrap-gap">
                                <input hx-trigger="change"   type="checkbox" th:field="*{selectedColors}" value="W" id="colorW" style="display:none;">
                                <label onclick="toggleWhite(this)" for="colorW" id="whiteToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'W')} ? 'color-W' : ''">W</label>

                                <input hx-trigger="change" type="checkbox" th:field="*{selectedColors}" value="U" id="colorU" style="display:none;">
                                <label onclick="toggleBlue(this)" for="colorU" id="blueToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'U')} ? 'color-U' : ''">U</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="B" id="colorB" style="display:none;">
                                <label onclick="toggleBlack(this)" for="colorB" id="blackToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'B')} ? 'active color-B' : ''">B</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="R" id="colorR" style="display:none;">
                                <label onclick="toggleRed(this)" for="colorR" id="redToggle"  class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'R')} ? 'active color-R' : ''">R</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="G" id="colorG" style="display:none;">
                                <label onclick="toggleGreen(this)" for="colorG" id="greenToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'G')} ? 'active color-G' : ''">G</label>
                            </div>
                        </div>

                        <div class="sort-group">
                            <label class="filter-label">Sort</label>
                            <div class="sort-row">
                                <select th:field="*{sortBy}" class="sort-select">
                                    <option value="commander">Commander</option>
                                    <option value="lastUpdated">Last Updated</option>
                                    <option value="color identity">Color Identity</option>
                                </select>
                                <select th:field="*{sortOrder}" class="sort-select sort-order">
                                    <option value="asc">Asc</option>
                                    <option value="desc">Desc</option>
                                </select>
                                <button type="submit" class="btn-primary">Apply</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="results-bar">
                <p>Showing <span th:text="${decks.size()}">0</span> decks</p>
                <div class="deck-actions">
                    <button class="btn-action" type="button" id="openNewDeckModalBtn">New Deck</button>
                    <button class="btn-action btn-secondary" type="button">New Folder</button>
                </div>
            </div>
            <div th:replace="fragments/add-deck-modal.html:: add-deck-modal">...</div>
            <div th:if="${#lists.isEmpty(decks)}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No decks found matching your filters.</p>
            </div>
            <div th:replace="fragments/deck-search-results.html :: decks"></div>
        </div>
    </main>
    <div th:replace="fragments/footer.html :: footer"></div>

<script th:src="@{/js/decks.js}" defer></script>
<script src='https://unpkg.com/htmx.org/dist/htmx.min.js'></script>
</body>
</html>
