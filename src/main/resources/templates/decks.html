<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deck Browser - MTG Deckbuilder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/decks.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div th:replace="fragments/nav-bar.html :: header"></div>
    <main class="main">
        <div class="deck-container">
            <div class="deck-header">
                <h1>Your Decks</h1>
                <p>Browse and search your Magic: The Gathering decks</p>
            </div>

            <form th:action="@{/decks}" method="get" th:object="${deckSearchCriteria}">
                <div class="filter-section">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" th:field="*{searchQuery}" placeholder="Search decks by name..." class="search-input">
                    </div>

                    <div class="filter-controls">
                        <div class="filter-group">
                            <label class="filter-label">Filter by Colors</label>
                            <div class="flex-wrap-gap">
                                <input type="checkbox" th:field="*{selectedColors}" value="W" id="colorW" style="display:none;">
                                <label onclick="toggleWhite(this)" for="colorW" id="whiteToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'W')} ? 'color-W' : ''">W</label>

                                <input  type="checkbox" th:field="*{selectedColors}" value="U" id="colorU" style="display:none;">
                                <label onclick="toggleBlue(this)" for="colorU" id="blueToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'U')} ? 'color-U' : ''">U</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="B" id="colorB" style="display:none;">
                                <label onclick="toggleBlack(this)" for="colorB" id="blackToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'B')} ? 'active color-B' : ''">B</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="R" id="colorR" style="display:none;">
                                <label onclick="toggleRed(this)" for="colorR" id="redToggle"  class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'R')} ? 'active color-R' : ''">R</label>

                                <input type="checkbox" th:field="*{selectedColors}" value="G" id="colorG" style="display:none;">
                                <label onclick="toggleGreen(this)" for="colorG" id="greenToggle" class="btn-filter" th:classappend="${#lists.contains(deckSearchCriteria.selectedColors, 'G')} ? 'active color-G' : ''">G</label>
                            </div>
                        </div>

                        <div class="sort-group">
                            <label class="filter-label">Sort</label>
                            <div class="sort-row">
                                <select th:field="*{sortBy}" class="sort-select">
                                    <option value="name">Name</option>
                                    <option value="lastUpdated">Last Updated</option>
                                </select>
                                <select th:field="*{sortOrder}" class="sort-select sort-order">
                                    <option value="asc">Asc</option>
                                    <option value="desc">Desc</option>
                                </select>
                                <button type="submit" class="btn-primary">Apply</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="results-bar">
                <p>Showing <span th:text="${decks.size()}">0</span> decks</p>
                <div class="deck-actions">
                    <button class="btn-action" type="button" id="openNewDeckModalBtn">New Deck</button>
                    <button class="btn-action btn-secondary" type="button">New Folder</button>
                </div>
            </div>

            <!-- New Deck Modal -->
            <div class="modal-overlay" id="newDeckModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="newDeckModalTitle">
                <div class="modal-container" role="document">
                    <div class="modal-header">
                        <h2 id="newDeckModalTitle">Create New Deck</h2>
                        <button class="modal-close" type="button" id="closeNewDeckModalBtn" aria-label="Close modal">✕</button>
                    </div>
                    <form th:action="@{/add-deck}" th:method="post" th:object="${newDeck}" class="modal-body" id="newDeckForm">
                        <div class="modal-section">
                            <label class="field-label" for="deckName">Name</label>
                            <input th:field="*{name}" class="field-input" type="text" id="deckName" name="name" placeholder="e.g., My Awesome Deck" maxlength="120">
                            <p class="field-help">
                                Enter a name for your deck.
                            </p>
                        </div>

                        <div class="modal-section grid-2">
                            <div class="field-group">
                                <label class="field-label" for="deckFormat">Format</label>
                                <select th:field="*{format}" class="field-select" id="deckFormat" name="format">
                                    <option value="Commander" selected>Commander</option>
                                    <option value="Modern">Modern</option>
                                    <option value="Pioneer">Pioneer</option>
                                    <option value="Standard">Standard</option>
                                </select>
                            </div>

                            <div class="field-group">
                                <div class="field-group">
                                <input type="text"
                                       th:field="*{commander}"
                                       id="commanderList"
                                       class="field-input"
                                       list="commanderOptions"
                                       placeholder="Add a card to your deck..."
                                       autocomplete="on"
                                       name="name"
                                >
                            </div>
                            <datalist id="commanderOptions" class="field-input">
                                <option th:each="card : ${listOfCommanders}" th:value="${card.name()}"></option>
                            </datalist>

                            </div>
                        </div>

                        <label class="check-row" for="legalOnly">
                            <input type="checkbox" id="legalOnly" name="legalOnly" checked>
                            <span>Search only legal cards</span>
                        </label>

                        <details class="advanced-details" id="newDeckAdvanced">
                            <summary>Advanced options</summary>
                            <div class="advanced-body">
                                <div class="modal-section grid-2">
                                    <div class="field-group">
                                        <label class="field-label" for="deckFolder">Folder</label>
                                        <input class="field-input" type="text" id="deckFolder" name="folder" placeholder="Optional">
                                    </div>

                                    <div class="field-group">
                                        <span class="field-label">Visibility</span>
                                        <div class="radio-row">
                                            <label class="radio-chip">
                                                <input type="radio" name="visibility" value="PUBLIC" checked>
                                                <span>Public</span>
                                            </label>
                                            <label class="radio-chip">
                                                <input type="radio" name="visibility" value="UNLISTED">
                                                <span>Unlisted</span>
                                            </label>
                                            <label class="radio-chip">
                                                <input type="radio" name="visibility" value="PRIVATE">
                                                <span>Private</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="modal-section">
                                    <label class="field-label" for="existingDeckListMode">Existing Deck List (optional)</label>
                                    <select class="field-select" id="existingDeckListMode" name="existingDeckListMode">
                                        <option value="NONE" selected>None</option>
                                        <option value="PASTE">Paste in List</option>
                                        <option value="FILE">From File</option>
                                        <option value="URL">From URL</option>
                                    </select>

                                    <div class="existing-list-panel" id="existingListPaste" hidden>
                                        <label class="field-label" for="existingListText">Paste in List</label>
                                        <textarea class="field-textarea" id="existingListText" name="existingListText"
                                                  placeholder="Paste your deck list here..."></textarea>
                                    </div>

                                    <div class="existing-list-panel" id="existingListFile" hidden>
                                        <label class="field-label" for="existingListFileInput">From File</label>
                                        <input class="field-input" type="file" id="existingListFileInput" name="existingListFileInput" accept=".txt,.csv">
                                    </div>

                                    <div class="existing-list-panel" id="existingListUrl" hidden>
                                        <label class="field-label" for="existingListUrlInput">From URL</label>
                                        <input class="field-input" type="url" id="existingListUrlInput" name="existingListUrlInput"
                                               placeholder="https://example.com/decklist">
                                    </div>
                                </div>
                            </div>
                        </details>

                        <div class="modal-footer">
                            <button class="btn-action btn-secondary" type="button" id="cancelNewDeckBtn">Cancel</button>
                            <button class="btn-action" type="submit">Create</button>
                        </div>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(decks)}" class="empty-state">
                <i class="fas fa-folder-open"></i>
                <p>No decks found matching your filters.</p>
            </div>

            <div class="deck-grid">
                <div th:each="deck : ${decks}" class="deck-item">
                    <div class="deck-item-inner">
                        <div class="deck-info">
                            <div class="deck-title-row">
                                <a th:href="${deck.getKey().name()}" th:text="${deck.getKey().name()}" class="deck-link">Deck Name</a>
                                <span th:if="${deck.getKey().bracket!= null}" class="badge bracket-badge"
                                      th:text="'Bracket ' + ${deck.getKey().bracket()}"></span>
                            </div>

                            <div class="deck-meta">
                                <div class="mana-colors">
                                    <span th:each="color : ${deck.getValue()}"
                                          th:class="'mana-symbol color-' + ${color}"
                                          th:text="${color}"></span>
                                </div>
                                <span class="meta-sep">•</span>
                                <span th:text="${deck.getKey().format()}">Commander</span>
                                <span class="meta-sep">•</span>
                                <span th:text="${#temporals.format(deck.getKey().last_updated(),'dd MMM yyyy')}">Date</span>
                            </div>
                        </div>
                        <i class="fas fa-external-link-alt external-icon"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div th:replace="fragments/footer.html :: footer"></div>

<script th:src="@{/js/decks.js}"></script>

</body>
</html>
