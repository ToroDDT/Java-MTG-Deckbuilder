<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account - MTG Deckbuilder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="ISO-8859-1">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="form-box">
            <form th:action="@{/register}" method="post">
                <h2 class="login-title">Create your account</h2>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        class="form-input"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="username">Username:</label>
                    <input
                        type="text"
                        name="username"
                        id="username"
                        class="form-input"
                        autocomplete="username"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        class="form-input"
                        autocomplete="new-password"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm password:</label>
                    <input
                        type="password"
                        name="confirmPassword"
                        id="confirmPassword"
                        class="form-input"
                        autocomplete="new-password"
                        required
                    />
                </div>
                <!--/*@thymesVar id="error" type=""*/-->
                <div th:if="${error}" class="error-message">
                    <p th:text="${error}"></p>
                </div>

                <div class="form-submit">
                    <input type="submit" value="Create Account" class="btn-submit"/>
                </div>

                <a th:href="@{/login}" class="forgot-link">Already have an account? Sign in</a>
            </form>
        </div>
    </div>
</div>

<footer class="login-footer">
    <p>By creating an account, you agree to the site terms.</p>
</footer>

</body>
</html>
