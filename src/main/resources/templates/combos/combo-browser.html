<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Browser</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="preconnect" href="https://cards.scryfall.io">
    <link rel="preload"
          href="https://rsms.me/inter/font-files/InterVariable.woff2?v=4.1"
          as="font"
          type="font/woff2"
          crossorigin>
    <th:block th:replace="~{fragments/font-awesome :: stylesheet-async}" />
    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/library.min.css}">
    <link rel="stylesheet" th:href="@{/css/nav-bar.min.css}">
    <link rel="stylesheet" th:href="@{/css/combos.css}">

    <!-- HTMX -->
    <script th:src="@{/js/htmx.min.js}" defer></script>
</head>

<body>

<div th:replace="~{fragments/nav-bar:: nav}"></div>

<main class="cb-page">
<!-- Page header -->
<div class="cb-page-header">
    <div class="cb-page-header-bg"></div>
    <h1 class="cb-page-title">Combo Browser</h1>
    <p class="cb-page-sub">
        Browse saved combos by card names, effect text, card details, and colors.
    </p>
</div>

<!-- Layout -->
<div class="cb-layout">

    <!-- Sidebar filters -->
    <aside th:replace="~{combos/combo-explorer :: combo-explorer(${personalLibrary}, ${filters}, ${ownedCard})}">
    </aside>

    <!-- Results (HTMX loads here) -->
    <div id="combos-list"
         class="cb-results-col rounded-2xl"
         th:hx-get="@{/personal-library/combos-list}"
         hx-trigger="load">
        Loading combos...
    </div>

</div>
    </main>

<footer class="cb-footer">
    <p>Card images and data provided by <a href="https://scryfall.com" target="_blank" rel="noopener noreferrer">Scryfall</a>. Not affiliated with Scryfall or Wizards of the Coast.</p>
</footer>

<script th:src="@{/js/library.min.js}" defer></script>
</body>
</html>
