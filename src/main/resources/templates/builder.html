<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Deckbuilder| Dashboard </title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script th:src="@{/js/builder-tailwind-config.min.js}"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/builder.min.css}"/>
    <link rel="stylesheet" th:href="@{/css/nav-bar.min.css}"/>
    <script src="https://unpkg.com/htmx.org/dist/htmx.min.js"></script>
    <script th:src="@{/js/chart.min.js}"></script>
</head>
<body class="">

<div th:replace="fragments/nav-bar.html :: nav"></div>

<div class="flex min-h-screen">
    <main class="flex-1 pl-3 pr-8 py-8 bg-surface">

        <!-- Hero Header -->
        <section class="mb-12">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div class="flex gap-8 items-start">
                    <div class="w-48 h-64 rounded-xl overflow-hidden shadow-[0_20px_40px_rgba(25,27,35,0.12)] shrink-0 border-4 border-white">
                        <img alt="The Commander" class="w-full h-full object-cover"
                             th:src="@{${builderView.image}}"
                        />
                    </div>
                    <div class="pt-4">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-secondary-container text-on-secondary-container text-[10px] font-black px-2 py-1 rounded-full tracking-widest uppercase">Commander</span>
                            <span class="flex items-center gap-1">
                                <div class="w-4 h-4 rounded-full bg-blue-500 border border-black/10"></div>
                                <div class="w-4 h-4 rounded-full bg-green-500 border border-black/10"></div>
                                <div class="w-4 h-4 rounded-full bg-white border border-black/10 shadow-sm"></div>
                            </span>
                        </div>
                        <h1 class="text-5xl font-black text-on-background tracking-tight mb-4 leading-none" th:text="${builderView.deckName}">The Necrobloom</h1>
                        <div class="flex gap-6 text-on-surface-variant font-medium">
                            <div class="flex flex-col">
                                <span class="text-[10px] uppercase tracking-wider text-slate-400">Owner</span>
                                <span th:text="${userName}">Owner</span>
                            </div>
                            <div class="flex flex-col border-l border-outline-variant pl-6">
                                <span class="text-[10px] uppercase tracking-wider text-slate-400">Win Rate</span>
                                <span class="text-blue-600">62.4%</span>
                            </div>
                            <div class="flex flex-col border-l border-outline-variant pl-6">
                                <span class="text-[10px] uppercase tracking-wider text-slate-400">Value</span>
                                <span th:text="'$'+${builderView.totalValue}">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col lg:flex-row lg:items-end gap-1">
                    <form id="builderAddCardForm" class="flex-1 flex flex-col gap-2 min-w-0"
                          th:action="@{/personal-library/add}" th:object="${ownedCard}" method="post">
                        <input type="hidden" name="_builderCardContext" value="true"/>
                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400" for="builder-card-name">
                            Search cards (add to library)
                        </label>

                        <!-- Wrap input + dropdown in a relative container -->
                        <div class="relative">
                            <input type="text" name="query" id="builder-card-name" autocomplete="off"
                                   class="rounded-xl font-medium bg-surface-container-highest text-on-surface shadow-sm border border-outline-variant/30 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                                   placeholder="Search a card..."
                                   th:attr="hx-get=@{/builder/deck/{did}/card-query(did=${builderView.deckId})}"
                                   hx-trigger="input changed delay:200ms"
                                   hx-target="#builder-card-query-results"
                                   hx-swap="innerHTML"
                                   hx-on::after-request="const r=document.getElementById('builder-card-query-results'); r.classList.toggle('hidden', !r.innerText.trim())"
                                   onblur="setTimeout(()=>document.getElementById('builder-card-query-results').classList.add('hidden'),150)"/>

                            <div id="builder-card-query-results"
                                 class="hidden absolute top-full left-0 right-0 mt-1 z-50
                max-h-60 overflow-y-auto
                rounded-xl border border-outline-variant/40
                bg-white shadow-lg
                px-1 py-1 text-left">
                            </div>
                        </div>
                    </form>

                    <div class="flex flex-wrap gap-3 shrink-0">
                        <button type="button" class="px-6 py-3 rounded-xl font-bold bg-white text-on-surface shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined">share</span> Share
                        </button>
                        <button type="button" class="px-6 py-3 rounded-xl font-bold bg-blue-400 text-on-surface shadow-sm hover:bg-slate-50 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined">Create</span> Buy
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Grid Content -->
        <div class="grid grid-cols-12 gap-8">

            <!-- Left Column: Decklist (8/12) -->
            <div class="col-span-12 xl:col-span-8 space-y-12">

                <!-- Creatures -->
                <div
                        id="type-layout-container"
                        th:attr="hx-get=@{/builder/type-layout/{id}(id=${builderView.deckId})}"
                        hx-trigger="load, cardsUpdated from:body"
                        hx-swap="innerHTML">
                </div>
                <!-- Asymmetric Visual: Featured Mechanic -->
                <div class="">

                    <main class="">



                        <section class="bg-white flex flex-wrap gap-4 p-4">

                            <div
                                    id="randomized-hand-container"
                                    th:attr="hx-get=@{/builder/randomize-cards(deckId=${builderView.deckId})}"
                                    hx-trigger="load, cardsUpdated from:body"
                                    hx-swap="innerHTML">

                                <div class="p-4 text-slate-400">
                                    Loading hand...
                                </div>

                            </div>

                        </section>

                    </main>

                </div>

            </div>

            <!-- Right Column: Statistics (4/12) -->
            <div class="col-span-12 xl:col-span-4 space-y-8">

                <!-- Mana Curve -->
                <div class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_20px_40px_rgba(25,27,35,0.06)] border border-outline-variant/10">
                    <h4 class="text-sm font-black text-on-background uppercase tracking-wider mb-8">Mana Curve</h4>
                    <div class="flex items-end justify-between h-48 gap-2">
                        <div>
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Color Production -->
                <div class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_20px_40px_rgba(25,27,35,0.06)] border border-outline-variant/10">
                    <h4 class="text-sm font-black text-on-background uppercase tracking-wider mb-6">Color Production</h4>
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                                    <span class="text-xs font-bold text-on-surface">Blue</span>
                                </div>
                                <span class="text-xs font-bold text-slate-400">38%</span>
                            </div>
                            <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 w-[38%] rounded-full"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                                    <span class="text-xs font-bold text-on-surface">Green</span>
                                </div>
                                <span class="text-xs font-bold text-slate-400">42%</span>
                            </div>
                            <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                                <div class="h-full bg-green-500 w-[42%] rounded-full"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-3 h-3 rounded-full bg-white border border-slate-200"></div>
                                    <span class="text-xs font-bold text-on-surface">White</span>
                                </div>
                                <span class="text-xs font-bold text-slate-400">20%</span>
                            </div>
                            <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                                <div class="h-full bg-slate-300 w-[20%] rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Type Distribution -->
                <div class="bg-surface-container-lowest rounded-3xl p-6 shadow-[0_20px_40px_rgba(25,27,35,0.06)] border border-outline-variant/10">
                    <h4 class="text-sm font-black text-on-background uppercase tracking-wider mb-6">Type Distribution</h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Ramp</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">12</span>
                                <span class="text-[10px] font-bold text-green-600">+2 High</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Draw</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">9</span>
                                <span class="text-[10px] font-bold text-blue-600">Optimal</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Removal</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">7</span>
                                <span class="text-[10px] font-bold text-slate-400">Low</span>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Board Wipes</span>
                            <div class="flex items-baseline gap-1">
                                <span class="text-2xl font-black text-on-background">3</span>
                                <span class="text-[10px] font-bold text-slate-400">Balanced</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- Mobile Nav Bar -->
<div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center h-16 z-50">
    <button class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-[10px] font-bold">Home</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-blue-600">
        <span class="material-symbols-outlined">list_alt</span>
        <span class="text-[10px] font-bold">Decks</span>
    </button>
    <div class="relative -top-6">
        <button class="bg-primary text-white p-4 rounded-full shadow-lg shadow-blue-300">
            <span class="material-symbols-outlined">add</span>
        </button>
    </div>
    <button class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">bar_chart</span>
        <span class="text-[10px] font-bold">Stats</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">account_circle</span>
        <span class="text-[10px] font-bold">Profile</span>
    </button>
</div>

<script>
    document.addEventListener('click', function (event) {
        var toggle = event.target.closest('.builder-card-actions-toggle');
        var insideActions = event.target.closest('.builder-card-actions-drop');
        var openDrops = document.querySelectorAll('.builder-card-actions-drop');

        if (insideActions) {
            return;
        }

        if (toggle) {
            var drop = toggle.nextElementSibling;
            var isOpen = drop && drop.innerHTML.trim().length > 0;

            openDrops.forEach(function (openDrop) {
                if (openDrop !== drop) {
                    openDrop.innerHTML = '';
                }
            });

            if (isOpen) {
                event.preventDefault();
                event.stopImmediatePropagation();
                drop.innerHTML = '';
            }
            return;
        }

        openDrops.forEach(function (drop) {
            drop.innerHTML = '';
        });
    }, true);

    document.addEventListener('htmx:configRequest', function (event) {
        var csrfMeta = document.querySelector('meta[name="_csrf"]');
        var hdrMeta = document.querySelector('meta[name="_csrf_header"]');
        if (csrfMeta && hdrMeta) {
            var t = csrfMeta.getAttribute('content');
            var h = hdrMeta.getAttribute('content');
            if (t && h) {
                event.detail.headers[h] = t;
            }
        }
    });
</script>
<script th:inline="javascript">
    const ctx = document.getElementById('myChart');
    const manaCurveData = /*[[${manaCurveData}]]*/ [];

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: /*[[${manaCurveLabels}]]*/ [],
            datasets: [
                {
                    label: 'Cards',
                    data: manaCurveData,
                    type: 'bar',
                    order: 2,
                    backgroundColor: 'rgba(37, 99, 235, 0.12)',
                    borderColor: 'rgba(37, 99, 235, 0.8)',
                    borderWidth: 1.5,
                    borderRadius: 6,
                    borderSkipped: false,
                    hoverBackgroundColor: 'rgba(37, 99, 235, 0.25)'
                },
                {
                    label: 'Distribution',
                    data: manaCurveData.map(v => v * 1.72),
                    type: 'line',
                    order: 1,
                    borderColor: 'rgba(99, 153, 34, 0.85)',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: false,
                    tension: 0.45
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#fff',
                    borderColor: 'rgba(0,0,0,0.08)',
                    borderWidth: 1,
                    titleColor: '#0f172a',
                    bodyColor: '#64748b',
                    titleFont: { family: 'Inter, sans-serif', size: 11, weight: '700' },
                    bodyFont: { family: 'Inter, sans-serif', size: 11 },
                    padding: 10,
                    cornerRadius: 10,
                    displayColors: false,
                    callbacks: {
                        title: (items) => 'CMC ' + items[0].label,
                        label: (item) => item.raw + ' cards'
                    }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    border: { display: false },
                    ticks: { color: '#94a3b8', font: { family: 'Inter, sans-serif', size: 11, weight: '600' } }
                },
                y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(0,0,0,0.04)' },
                    border: { display: false },
                    ticks: { color: '#94a3b8', font: { family: 'Inter, sans-serif', size: 11 }, stepSize: 5, maxTicksLimit: 5 }
                }
            }
        }
    });
</script>
</body>
</html>
