<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Card Hand - Digital Archivist</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --archivist-blue: #3b82f6;
            --archivist-slate: #0f172a;
            --archivist-gray: #64748b;
            --archivist-light: #f8fafc;
            --archivist-border: #e2e8f0;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .grad-text {
            background: linear-gradient(135deg, #3b82f6 0%, #0f172a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen text-[#0f172a]">

<div class="w-full px-4 pb-24 pt-10 flex flex-col items-center">

    <!-- Scene label -->
    <p class="text-[11px] font-bold tracking-[0.2em] uppercase mb-10 text-[#64748b]">Your Hand</p>

    <!-- Combos section -->
    <div id="personal-cards"
         th:fragment="combos-section"
         class="flex flex-col w-full max-w-6xl rounded-lg overflow-hidden border border-[#e2e8f0] shadow-sm bg-white h-[20vh]h" >

        <main class="px-6 md:px-12 py-16">

            <!-- Header -->
            <div class="max-w-4xl mx-auto mb-16">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div>
                        <span class="text-xs font-bold tracking-[0.2em] text-[#3b82f6] uppercase mb-3 block">Curation Feed</span>
                        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-[#0f172a] leading-none mb-4">Available Combos</h1>
                        <p class="text-[#64748b] max-w-xl text-lg leading-relaxed">A high-fidelity record of lethal interactions and infinite engine sequences across the multiverse.</p>
                    </div>
                    <div class="flex flex-col items-start md:items-end gap-2">
                        <div class="bg-[#f1f5f9] text-[#0f172a] px-5 py-2.5 rounded-md flex items-center gap-2 border border-[#e2e8f0]">
                            <span class="material-symbols-outlined text-sm text-[#3b82f6]">database</span>
                            <span class="text-sm font-semibold">1,248 Records Found</span>
                        </div>
                        <div class="text-[10px] uppercase tracking-wider text-[#94a3b8] px-1 font-bold">Last updated: 4 hours ago</div>
                    </div>
                </div>
            </div>

            <!-- Combo list -->
            <div class="max-w-4xl mx-auto flex flex-col gap-12 h-[75vh] overflow-y-auto pr-2">

                <div class="group" th:each="cardList, comboStat : ${cardCombos.images}">

                    <!-- Index label -->
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-1.5 h-8 bg-[#3b82f6] rounded-full"></div>
                        <span class="text-[#94a3b8] text-sm font-medium"
                              th:text="'Combo #' + ${comboStat.index + 1}">Combo #1</span>
                    </div>

                    <!-- Combo card -->
                    <div class="bg-[#f8fafc] rounded-xl relative transition-all duration-300 border border-[#e2e8f0] hover:border-[#3b82f6]/30">
                        <div class="p-6 lg:p-8">

                            <!-- Card images floated right so text wraps around them -->
                            <div class="float-right ml-6 mb-4 flex flex-row flex-wrap gap-3 justify-end"
                                 style="max-width: 60%;">
                                <div th:each="img : ${cardList}" class="flex-shrink-0">
                                    <div class="w-32 aspect-[2.5/3.5] bg-[#f1f5f9] rounded-lg overflow-hidden border border-[#e2e8f0] shadow-sm hover:scale-[1.03] transition-transform duration-300">
                                        <img th:src="${img}"
                                             alt="Card art"
                                             class="w-full h-full object-cover"
                                             loading="lazy"
                                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
                                        <div class="w-full h-full hidden items-center justify-center bg-[#f1f5f9] text-2xl text-[#94a3b8]">🃏</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Text flows left, wraps under cards naturally -->
                            <h4 class="text-[10px] font-black tracking-widest text-[#3b82f6] uppercase mb-4">Mechanism</h4>

                            <div class="text-[#475569] text-xs leading-relaxed"
                                 th:with="desc=${cardCombos.description[comboStat.index]},
                                           steps=${#strings.arraySplit(desc, '.')}">
                                <p th:each="step, stepStat : ${steps}"
                                   th:if="${!#strings.isEmpty(#strings.trim(step))}"
                                   class="mb-4">
                                    <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-[#3b82f6]/10 text-[#3b82f6] text-[10px] font-black mr-2"
                                          th:text="${stepStat.index + 1}">1</span>
                                    <span th:text="${#strings.trim(step) + '.'}">Step text.</span>
                                </p>
                            </div>

                            <!-- Tags — clearfix so they sit below floated cards -->
                            <div class="clear-both mt-4 flex gap-2 flex-wrap">
                                <span class="bg-[#f1f5f9] text-[#64748b] border border-[#e2e8f0] px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider">Graveyard</span>
                                <span class="bg-[#f1f5f9] text-[#64748b] border border-[#e2e8f0] px-3 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider">Aura</span>
                            </div>

                        </div>
                    </div>

                </div>
                <!-- /combo row -->

            </div>
            <!-- /combo list -->

        </main>
    </div>
    <!-- /combos-section -->

</div>

<!-- Floating Action Button -->
<button class="fixed bottom-8 right-8 bg-[#3b82f6] text-white h-14 w-14 rounded-lg shadow-lg flex items-center justify-center hover:bg-[#2563eb] active:scale-95 transition-all duration-200 group z-50">
    <span class="material-symbols-outlined text-2xl">add</span>
    <span class="absolute right-16 bg-[#0f172a] text-white px-4 py-2 rounded-md text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap shadow-xl">
        Register New Combo
    </span>
</button>

<!-- Info Toast -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border border-[#e2e8f0] px-6 py-3 rounded-lg shadow-xl flex items-center gap-4 z-50">
    <div class="flex -space-x-1.5">
        <div class="w-5 h-5 rounded-md bg-[#3b82f6] border border-white"></div>
        <div class="w-5 h-5 rounded-md bg-[#64748b] border border-white"></div>
        <div class="w-5 h-5 rounded-md bg-[#0f172a] border border-white"></div>
    </div>
    <span class="text-xs font-semibold text-[#64748b]">Archivist Mode: <span class="text-[#0f172a] font-bold">Collaborative Curation</span></span>
</div>


</body>
</html>
