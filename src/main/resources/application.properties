spring.application.name=mtg_deckbuilder


# Database configuration is provided by the deployment environment.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

server.tomcat.max-part-count=200
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Optional: HikariCP connection pool settings (Highly recommended for performance)
spring.datasource.hikari.maximum-pool-size=10
# HTTP response compression (gzip). Thymeleaf HTML is compressed on the wire when the client
# sends Accept-Encoding: gzip (browsers do this by default). This does not strip whitespace
# in template files — only the transferred bytes are compressed.
server.compression.enabled=true
# Text-like responses only (avoid compressing images, fonts, etc.).
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml,application/xhtml+xml,image/svg+xml
# Compress once body is large enough that gzip overhead is usually worth it (Tomcat default is 2KB).
server.compression.min-response-size=1024
# Logs the SQL statements executed via JdbcTemplate

scanner.host=${SCANNER_HOST:localhost}
scanner.port=${SCANNER_PORT:50051}
